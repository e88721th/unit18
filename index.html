<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>陳樵國語文</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
    .option-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 0.5rem; font-size: 0.9rem; min-height: 40px; display: flex; align-items: center; }
    .option-btn:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .confetti { position: absolute; width: 10px; height: 10px; border-radius: 50%; animation: fall 3s linear forwards; }
    @keyframes fall { to { transform: translateY(800px) rotate(720deg); opacity: 0; } }
    #quiz-container { max-height: 80vh; overflow-y: auto; padding: 1rem; }
    .leaderboard-row.current-user { background-color: #dbeafe; font-weight: 600; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-rose-50 min-h-screen pb-12">
  <div class="max-w-2xl mx-auto p-4">
    <div class="flex justify-between items-center mb-8">
      <h3 class="text-4xl font-bold text-indigo-700">🎓陳樵</h3>
      <div id="header-buttons">
        <button onclick="showLeaderboard()" class="px-3 py-2 bg-white rounded-2xl shadow text-indigo-600 hover:bg-indigo-50 text-sm w-24">排行榜</button>
      </div>
    </div>
    <div id="quiz-container" class="bg-white rounded-3xl shadow-2xl min-h-[520px]"></div>
  </div>

  <script>
    let allQuestions = [], questions = [], wrongQuestions = [], current = 0, score = 0, timerInterval, username = '', currentUnit = '';

    async function loadQuestions() {
      try {
        const res = await fetch('questions-unit.json');
        allQuestions = await res.json();
        showWelcomeScreen();
      } catch (e) {
        document.getElementById('quiz-container').innerHTML = `<div class="text-center py-20 text-red-600">❌ 無法載入題目</div>`;
      }
    }

    function showWelcomeScreen() {
      document.getElementById('quiz-container').innerHTML = `
        <div class="text-center py-16">
          <div class="text-7xl mb-6">📝</div>
          <h3 class="text-4xl font-bold text-indigo-700 mb-3">四年級國語文</h3>
          <input id="username" type="text" placeholder="使用者姓名" class="px-4 py-2 border border-gray-300 rounded-md mb-4">
          <button onclick="login()" class="w-full py-5 bg-indigo-600 text-white text-2xl font-medium rounded-3xl shadow-xl">登入</button>
        </div>
      `;
    }

    function login() {
      const input = document.getElementById('username');
      if (input.value.trim()) { username = input.value.trim(); showUnitSelection(); }
      else alert('請輸入姓名');
    }

    function showUnitSelection() {
      let html = `<div class="text-center py-8"><h2 class="text-3xl font-bold mb-8">請選擇測驗單元</h2>
        <div class="grid grid-cols-5 gap-3 mb-6">` + 
        [1,2,3,4,5].map(i => `<button onclick="startUnit(${i})" class="py-5 bg-white border rounded-2xl font-medium hover:bg-indigo-50">單元 ${i}</button>`).join('') + 
        `</div><button onclick="startAllUnits()" class="w-full py-5 bg-amber-400 text-white text-xl font-medium rounded-3xl">📚 全部混合</button></div>`;
      document.getElementById('quiz-container').innerHTML = html;
    }

    function startUnit(u) { questions = shuffle(allQuestions.filter(q => q.unit === u)); currentUnit = u; resetQuiz(); }
    function startAllUnits() { questions = shuffle([...allQuestions]); currentUnit = '全'; resetQuiz(); }
    function resetQuiz() { current = 0; score = 0; wrongQuestions = []; loadQuestion(); }
    function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

    function loadQuestion() {
      const q = questions[current];
      const s = shuffle([...q.options]);
      const correct = s.indexOf(q.options[q.answer]);
      document.getElementById('quiz-container').innerHTML = `
        <div class="mb-6 text-sm">單元 ${q.unit} • ${current+1}/${questions.length}</div>
        <div class="text-2xl font-medium mb-6">${current + 1}. ${q.question}</div>
        <div class="grid gap-2">${s.map((o,i) => `<button onclick="select(${i}, ${correct}, '${q.explanation}')" class="option-btn bg-gray-50 border rounded-3xl">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
        <div id="feedback" class="mt-4 hidden"></div>
      `;
    }

    window.select = function(idx, correct, exp) {
      const isCorrect = idx === correct;
      if (isCorrect) score++; else wrongQuestions.push(questions[current]);
      document.getElementById('feedback').innerHTML = `<div class="p-4 rounded-3xl ${isCorrect?'bg-green-100':'bg-red-100'}">${isCorrect?'🎉 答對！':'😔 答錯'} - ${exp}</div>
        <button onclick="next()" class="mt-4 w-full py-4 bg-indigo-600 text-white rounded-3xl">${current < questions.length-1 ? '下一題' : '查看成績'}</button>`;
      document.getElementById('feedback').classList.remove('hidden');
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    };

    window.next = () => { current++; current < questions.length ? loadQuestion() : showResult(); };

    function showResult() {
      const pct = Math.round((score / questions.length) * 100);
      const scores = JSON.parse(localStorage.getItem('idiomHighScores') || '[]');
      scores.push({ username, score: pct, unit: currentUnit, date: new Date().toLocaleDateString() });
      localStorage.setItem('idiomHighScores', JSON.stringify(scores.sort((a,b) => b.score - a.score)));
      
      document.getElementById('quiz-container').innerHTML = `
        <div class="text-center py-12">
          <h2 class="text-4xl font-bold mb-4">${pct}% 正確率</h2>
          <div class="grid grid-cols-2 gap-3">
            ${wrongQuestions.length > 0 ? `<button onclick="startReview()" class="py-4 bg-orange-500 text-white rounded-3xl">重練錯題</button>` : ''}
            <button onclick="location.reload()" class="py-4 bg-indigo-600 text-white rounded-3xl">回到首頁</button>
            <button onclick="showLeaderboard()" class="py-4 bg-green-600 text-white rounded-3xl">排行榜</button>
            <button onclick="showUnitSelection()" class="py-4 bg-blue-600 text-white rounded-3xl">選單元</button>
          </div>
        </div>`;
    }

    window.startReview = function() { questions = shuffle([...wrongQuestions]); resetQuiz(); };
    window.showLeaderboard = function() {
      const s = JSON.parse(localStorage.getItem('idiomHighScores') || '[]');
      document.getElementById('quiz-container').innerHTML = `<h2 class="text-2xl font-bold mb-4">🏆 排行榜</h2><table class="w-full">${s.map((x,i) => `<tr class="${x.username===username?'bg-blue-100':''}"><td>${i+1}</td><td>${x.username}</td><td>${x.score}%</td></tr>`).join('')}</table><button onclick="location.reload()" class="mt-6 w-full py-3 bg-gray-200 rounded-3xl">返回</button>`;
    };
    window.onload = loadQuestions;
  </script>
</body>
</html>
